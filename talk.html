<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무슨 일이 있었어?</title>
  <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2207@1.0/KOPUBWORLD_DOTUM_MEDIUM.woff2" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #fff;
      font-family: 'KOPUBWORLD DOTUM', sans-serif;
      color: #222;
    }
    .title {
      font-size: 22px;
      margin-bottom: 16px;
    }
    .chat-box {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
    }
    .user-input {
      width: calc(100% - 100px);
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .submit-btn {
      padding: 10px 20px;
      background-color: #0095ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="title">무슨 일이 있었어?</div>
  <div class="chat-box" id="chatBox">
    <p>🤖 안녕! 오늘 어떤 일이 있었는지 들려줄래?</p>
  </div>

  <div class="button-row">
    <input type="text" id="userInput" class="user-input" placeholder="말하고 싶은 걸 적어줘 또는 마이크로 말해줘">
    <button class="submit-btn" onclick="sendMessage()">보내기</button>
  </div>

  <div class="button-row">
    <button onclick="startAnalysis()">분석하기</button>
    <button onclick="goToNextPage()">다음 단계로</button>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    // ✅ [1] 사용자 입력 보내기
    function sendMessage() {
      const message = userInput.value.trim();
      if (message) {
        const userBubble = document.createElement('p');
        userBubble.textContent = `🙋‍♀️ ${message}`;
        chatBox.appendChild(userBubble);

        userInput.value = '';

        // ✅ [2] GPT 응답 연동
        fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer 여기에_너의_API_KEY_입력'
          },
          body: JSON.stringify({
            model: 'gpt-4',
            messages: [
              { role: 'system', content: '너는 아이의 이야기를 잘 들어주는 상담 선생님이야.' },
              { role: 'user', content: message }
            ]
          })
        })
        .then(response => response.json())
        .then(data => {
          const reply = data.choices[0].message.content;
          const botBubble = document.createElement('p');
          botBubble.textContent = `🤖 ${reply}`;
          chatBox.appendChild(botBubble);

          speak(reply); // ✅ TTS로 응답 읽어주기
          chatBox.scrollTop = chatBox.scrollHeight;
        })
        .catch(error => console.error('GPT 오류:', error));
      }
    }

    // ✅ [3] TTS 기능
    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ko-KR';
      utterance.rate = 1.0;
      speechSynthesis.speak(utterance);
    }

    function startAnalysis() {
      alert('감정 분석을 시작할게!');
      window.location.href = 'analysis.html';
    }

    function goToNextPage() {
      window.location.href = 'confirm.html';
    }
  </script>
</body>
</html>
